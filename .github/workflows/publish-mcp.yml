name: Publish specflow to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (skip publish)"
        type: boolean
        default: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Never run on forks — avoids leaking secrets on untrusted code
    if: github.repository == 'griddynamics/specflow'

    outputs:
      artifact-name: ${{ steps.build.outputs.artifact-name }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build twine

      - name: Set version from tag
        working-directory: mcp_server
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "Building version $VERSION"

      - name: Build sdist and wheel
        id: build
        working-directory: mcp_server
        run: |
          python -m build
          echo "artifact-name=dist" >> "$GITHUB_OUTPUT"

      - name: Check distribution
        working-directory: mcp_server
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: mcp_server/dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Skip publish on workflow_dispatch dry-run
    if: |
      github.repository == 'griddynamics/specflow' &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)

    # Trusted Publishing configured at https://pypi.org/manage/account/publishing/
    # publisher: GitHub Actions, owner: griddynamics, repo: specflow,
    # workflow: publish-mcp.yml, environment: pypi
    environment:
      name: pypi
      url: https://pypi.org/p/gd-specflow

    permissions:
      id-token: write  # required for OIDC Trusted Publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # PLACEHOLDER: if Trusted Publishing is not yet configured, uncomment
        # the line below and add PYPI_API_TOKEN to the 'pypi' Environment secrets:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
