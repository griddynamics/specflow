# Docker Compose Configuration for SpecFlow Backend
#
# Profiles:
#   - default: backend + SQLite (local dev — no GCP credentials, no separate DB container)
#   - test: Connect to an already-hosted GCP Firestore instance (requires credentials)
#
# Usage:
#   docker-compose up                                    # Dev mode: backend + sqlite
#   docker-compose --profile test up                     # Test mode: connect to hosted Firestore

services:
  # Backend Service - Runs in both dev and test modes
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Git tag/branch/SHA of the griddynamics/rosetta marketplace to bake in.
        # Sourced from .env; falls back to the Dockerfile's own pinned default.
        ROSETTA_MARKETPLACE_REF: ${ROSETTA_MARKETPLACE_REF:-v2.0.55}
    image: specflow-backend:latest
    container_name: ${SPECFLOW_BACKEND_CONTAINER:-specflow-backend}
    ports:
      - "${SPECFLOW_BACKEND_PORT:-8000}:8000"
    environment:
      # Common environment variables
      # The active LLM provider is derived from whichever key is set (both -> openrouter).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - WORKSPACE_BASE_PATH=/workspaces
      - NOTIFY_EMAIL_USERNAME=${NOTIFY_EMAIL_USERNAME}
      - NOTIFY_EMAIL_PASSWORD=${NOTIFY_EMAIL_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_TOKEN_DEFAULT=${GITHUB_TOKEN_DEFAULT:-${GITHUB_TOKEN}}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      - P10Y_API_KEY=${P10Y_API_KEY}
      - P10Y_ORGANISATION_ID=${P10Y_ORGANISATION_ID}
      # Skip mode for testing workflows without agent execution
      - SKIP_AGENT_EXECUTION=${SKIP_AGENT_EXECUTION:-false}
      # Database configuration - defaults to sqlite (local dev, no separate DB container).
      # Override via .env for DATABASE_TYPE=firestore to connect to an already-hosted,
      # GCP-managed Firestore instance (SpecFlow never deploys/manages Firestore itself),
      # or DATABASE_TYPE=emulator to connect to a manually-run Firestore emulator process.
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      # Container-internal, fixed. The db always lives under the /root/.specflow bind mount;
      # relocate/isolate it by pointing SPECFLOW_HOME_MOUNT_PATH at a different host dir, not
      # by changing this path (which the container interprets literally, off the mount).
      - SQLITE_DB_PATH=/root/.specflow/db/specflow.db
      - FIRESTORE_EMULATOR_HOST=${FIRESTORE_EMULATOR_HOST}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-local-dev}
      - FIRESTORE_DATABASE_NAME=${FIRESTORE_DATABASE_NAME:-specflow}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://eu.i.posthog.com}
      - FIGMA_ACCESS_TOKEN=${FIGMA_ACCESS_TOKEN}
      # Rosetta KB runs against the Rosetta plugin baked into the image (no service/key needed).
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - AUTH_MODE=${AUTH_MODE:-api_key}
      - LOCAL_USER_EMAIL=${LOCAL_USER_EMAIL}
      - LOCAL_USER_NAME=${LOCAL_USER_NAME}
      - POSTHOG_ENABLED=${POSTHOG_ENABLED:-true}
    volumes:
      # Isolated workspace mounts - each workspace at its own root
      - ${WORKSPACE_MOUNT_PATH:-./workspaces}:/workspaces:rw
      - ${AGENT_LOGS_MOUNT_PATH:-./agent_logs}:/agent_logs:rw
      # Note: agent_logs are stored in dedicated mount at /agent_logs
      # For local development, this can be configured via AGENT_LOGS_MOUNT_PATH environment variable
      # Bind mount (not a named volume) to the host's ~/.specflow/ directory — the SAME
      # directory the host-side TUI/CLI writes config.json into, and the single central
      # SQLite database shared across every local project/MCP session on this machine
      # (the local-dev analogue of the old shared Firestore emulator). NEVER point
      # SPECFLOW_HOME_MOUNT_PATH at NFS/Filestore-backed storage.
      - ${SPECFLOW_HOME_MOUNT_PATH:-${HOME}/.specflow}:/root/.specflow:rw
      # For test profile connecting to a hosted GCP Firestore instance, optionally mount
      # GCP credentials
      # - ${GOOGLE_APPLICATION_CREDENTIALS:-}:/app/credentials.json:ro
    networks:
      - specflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stop_grace_period: 120s

networks:
  specflow-network:
    driver: bridge
