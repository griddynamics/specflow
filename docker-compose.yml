# Docker Compose Configuration for SpecFlow Backend
#
# Profiles:
#   - default (dev): Uses Firestore Emulator for local development (no GCP credentials needed)
#   - test: Uses real GCP Firestore (requires GCP credentials and proper .env setup)
#   - mcp: MCP Server for Cursor IDE integration (starts backend + mcp-server)
#
# Usage:
#   docker-compose up                                    # Dev mode: backend + emulator
#   docker-compose --profile test up                     # Test mode: backend + real Firestore

services:
  # Firestore Emulator - Only runs in dev mode (default)
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    # Container name is parameterized so an isolated test stack (COMPOSE_PROJECT_NAME=specflow-test)
    # can run its own containers without colliding with a self-hosted quickstart deployment.
    container_name: ${SPECFLOW_FIRESTORE_CONTAINER:-specflow-firestore-emulator}
    ports:
      - "${SPECFLOW_FIRESTORE_PORT:-8080}:8080"
    # gcloud wraps a JVM child; an init reaps zombies and forwards SIGTERM to it
    # so --export-on-exit actually fires on `docker compose down`.
    init: true
    # Stop order is backend -> firestore-exporter -> firestore-emulator, so the
    # exporter can take one final snapshot while the emulator is still alive.
    stop_grace_period: 120s
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-local-dev}
      - FIRESTORE_DATABASE_NAME=${FIRESTORE_DATABASE_NAME:-specflow}
    command:
      - /bin/sh
      - /specflow-scripts/firestore-emulator-entrypoint.sh
    volumes:
      - ${WORKSPACE_MOUNT_PATH:-./workspaces}/firestore_emulator:/firestore-data:rw
      - ./scripts:/specflow-scripts:ro
    networks:
      - specflow-network
    restart: unless-stopped
    healthcheck:
      # Check if emulator is responding (returns "OK" on HTTP)
      # The emulator exposes an HTTP endpoint that returns "OK" when ready
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s  # Give emulator more time to start (gRPC can take a while)
    # Emulator only needed in dev mode, not in test profile
    profiles: ["", "dev"]  # Empty string means default profile

  # Firestore Emulator Exporter - Periodic local-only snapshots for quickstart durability.
  # The emulator is in-memory; --export-on-exit is retained as a shutdown fallback, while
  # this sidecar limits data loss when the emulator does not exit cleanly.
  firestore-exporter:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: ${SPECFLOW_FIRESTORE_EXPORTER_CONTAINER:-specflow-firestore-exporter}
    depends_on:
      firestore-emulator:
        condition: service_healthy
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-local-dev}
      - FIRESTORE_DATABASE_NAME=${FIRESTORE_DATABASE_NAME:-specflow}
      - FIRESTORE_EXPORT_INTERVAL_SECONDS=${FIRESTORE_EXPORT_INTERVAL_SECONDS:-60}
    command:
      - /bin/sh
      - /specflow-scripts/firestore-emulator-exporter.sh
    volumes:
      - ${WORKSPACE_MOUNT_PATH:-./workspaces}/firestore_emulator:/firestore-data:rw
      - ./scripts:/specflow-scripts:ro
    networks:
      - specflow-network
    restart: unless-stopped
    stop_grace_period: 120s
    profiles: ["", "dev"]

  # Backend Service - Runs in both dev and test modes
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: specflow-backend:latest
    container_name: ${SPECFLOW_BACKEND_CONTAINER:-specflow-backend}
    ports:
      - "${SPECFLOW_BACKEND_PORT:-8000}:8000"
    environment:
      # Common environment variables
      # The active LLM provider is derived from whichever key is set (both -> openrouter).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - WORKSPACE_BASE_PATH=/workspaces
      - NOTIFY_EMAIL_USERNAME=${NOTIFY_EMAIL_USERNAME}
      - NOTIFY_EMAIL_PASSWORD=${NOTIFY_EMAIL_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_TOKEN_DEFAULT=${GITHUB_TOKEN_DEFAULT:-${GITHUB_TOKEN}}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      - P10Y_API_KEY=${P10Y_API_KEY}
      - P10Y_ORGANISATION_ID=${P10Y_ORGANISATION_ID}
      # Skip mode for testing workflows without agent execution
      - SKIP_AGENT_EXECUTION=${SKIP_AGENT_EXECUTION:-false}
      # Database configuration - defaults to emulator mode
      # Override via .env file for test mode
      - DATABASE_TYPE=${DATABASE_TYPE:-emulator}
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-local-dev}
      - FIRESTORE_DATABASE_NAME=${FIRESTORE_DATABASE_NAME:-specflow}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://eu.i.posthog.com}
      - FIGMA_ACCESS_TOKEN=${FIGMA_ACCESS_TOKEN}
      # Rosetta KB. The live ims-mcp server is OFF by default — KB init runs against the Rosetta
      # plugin baked into the image (generic KB, no service/key needed). Set ROSETTA_MCP_ENABLED=true
      # (+ ROSETTA_API_KEY / ROSETTA_SERVER_URL) to opt into the live, project-tailored KB; the live
      # MCP then takes precedence over the bundled plugin. Passed through explicitly so the value
      # tracks your .env rather than the image default.
      - ROSETTA_MCP_ENABLED=${ROSETTA_MCP_ENABLED:-false}
      - ROSETTA_SERVER_URL=${ROSETTA_SERVER_URL}
      - ROSETTA_API_KEY=${ROSETTA_API_KEY}
      - ROSETTA_USER_EMAIL=${ROSETTA_USER_EMAIL}
      - ROSETTA_IMS_VERSION=${ROSETTA_IMS_VERSION}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - AUTH_MODE=${AUTH_MODE:-api_key}
      - LOCAL_USER_EMAIL=${LOCAL_USER_EMAIL}
      - LOCAL_USER_NAME=${LOCAL_USER_NAME}
      - POSTHOG_ENABLED=${POSTHOG_ENABLED:-true}
      # Local quickstart may let agents add missing Android SDK packages through
      # ensure-android-sdk-package. Hosted/default config keeps this disabled.
      - ALLOW_AGENT_SDKMANAGER=${ALLOW_AGENT_SDKMANAGER:-true}
    volumes:
      # Isolated workspace mounts - each workspace at its own root
      - ${WORKSPACE_MOUNT_PATH:-./workspaces}:/workspaces:rw
      - ${AGENT_LOGS_MOUNT_PATH:-./agent_logs}:/agent_logs:rw
      # Note: agent_logs are stored in dedicated mount at /agent_logs
      # For local development, this can be configured via AGENT_LOGS_MOUNT_PATH environment variable
      # For test profile with real Firestore, optionally mount GCP credentials
      # - ${GOOGLE_APPLICATION_CREDENTIALS:-}:/app/credentials.json:ro
    networks:
      - specflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # In dev mode, wait for the exporter too. Compose stops services in reverse
    # dependency order, so backend shutdown marks in-flight runs failed before
    # the exporter performs its final snapshot and before the emulator exits.
    depends_on:
      firestore-emulator:
        condition: service_healthy
      firestore-exporter:
        condition: service_started
    stop_grace_period: 120s

networks:
  specflow-network:
    driver: bridge
