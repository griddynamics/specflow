[pytest]
# Pytest configuration for the backend application

testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    regression: marks tests as regression tests for state management refactor (run with: pytest -m regression)
    e2e: marks tests as end-to-end tests requiring the Firestore emulator
    integration: marks tests that run real git commands against temporary repos (run with: pytest -m integration)

